<svg
  xmlns="http://www.w3.org/2000/svg"
  width="512"
  height="512"
  viewBox="0 0 512 512"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Lightener Studio icon</title>
  <desc id="desc">
    An original abstract brightness response curve with three control points.
  </desc>
  <metadata>
    Original Lightener Studio brand source. This mark uses abstract curve
    geometry only; it does not reuse Home Assistant imagery, bulb symbols,
    lightning bolts, or upstream Lightener artwork.
  </metadata>
  <defs>
    <linearGradient
      id="guide"
      x1="82"
      y1="372"
      x2="432"
      y2="122"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0" stop-color="#0f172a" stop-opacity=".22" />
      <stop offset="1" stop-color="#0891b2" stop-opacity=".36" />
    </linearGradient>
    <linearGradient
      id="curve"
      x1="80"
      y1="372"
      x2="432"
      y2="122"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0" stop-color="#2563eb" />
      <stop offset=".62" stop-color="#0891b2" />
      <stop offset="1" stop-color="#f59e0b" />
    </linearGradient>
  </defs>
  <path
    d="M82 372 432 122"
    fill="none"
    stroke="url(#guide)"
    stroke-width="24"
    stroke-linecap="round"
  />
  <path
    d="M80 372 C156 372 174 350 218 300 C272 238 270 168 322 144 C354 130 392 126 432 122"
    fill="none"
    stroke="url(#curve)"
    stroke-width="48"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <g fill="#f8fafc" stroke-width="14">
    <circle cx="80" cy="372" r="28" stroke="#2563eb" />
    <circle cx="262" cy="240" r="25" stroke="#0891b2" />
    <circle cx="432" cy="122" r="28" stroke="#f59e0b" />
  </g>
</svg>
