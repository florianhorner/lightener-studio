name: "Demo refresh"

# Regenerates the README demo GIF on demand and opens a reviewable bot PR.
# Run this during release prep (before cutting the tag) so the fresh GIF ships
# IN that release — the release.yml freshness gate fails if the card/capture
# sources changed since the committed GIF was generated.
#
# workflow_dispatch ONLY (not release:published): auto-on-release would land the
# PR one release late and race the gh-pages deploy. This is the single writer of
# the demo asset.
on:
  workflow_dispatch:

# One refresh at a time; a newer dispatch supersedes an in-flight one.
concurrency:
  group: demo-refresh
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

env:
  GIFSKI_VERSION: "1.34.0"

jobs:
  refresh:
    name: "Capture + open PR"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@v4"
        with:
          fetch-depth: 0 # need origin/master to enforce a current base

      - name: "Refuse a stale base"
        shell: "bash"
        run: |
          # The GIF must be shot from the latest master so it matches what will be
          # released. If this dispatch ref isn't origin/master's tip, refuse.
          git fetch origin master --quiet
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/master)" ]; then
            echo "::error::Base is not current with origin/master. Dispatch from an up-to-date master."
            exit 1
          fi
          echo "✓ base == origin/master"

      - name: "Set up Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: js/package-lock.json

      - name: "Install frontend dependencies"
        working-directory: js
        run: npm ci

      - name: "Install Playwright browser"
        working-directory: js
        run: npx playwright install --with-deps chromium

      - name: "Install ffmpeg (fallback encoder)"
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: "Cache gifski (canonical encoder, pinned)"
        id: gifski-cache
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/gifski
          key: gifski-${{ env.GIFSKI_VERSION }}-linux

      - name: "Install gifski"
        # Runner-owned path (no sudo) so cache save/restore preserves perms cleanly.
        shell: "bash"
        run: |
          mkdir -p ~/.local/bin
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          if [ ! -x ~/.local/bin/gifski ]; then
            curl -fsSL "https://github.com/ImageOptim/gifski/releases/download/${GIFSKI_VERSION}/gifski-${GIFSKI_VERSION}.tar.xz" -o /tmp/gifski.tar.xz
            tar xJf /tmp/gifski.tar.xz -C /tmp linux/gifski
            install /tmp/linux/gifski ~/.local/bin/gifski
          fi

      - name: "Build the card bundle"
        working-directory: js
        run: npm run build

      - name: "Capture the demo GIF"
        working-directory: js
        run: |
          gifski --version
          npm run demo:capture

      - name: "Warn if DEMO_PAT is unset"
        if: ${{ secrets.DEMO_PAT == '' }}
        run: echo "::warning::DEMO_PAT secret not set — the bot PR is created with GITHUB_TOKEN, so downstream CI (the demo rot guard) will NOT run on it. Review the GIF by hand before merging."

      - name: "Open / update the demo-refresh PR"
        # NOTE: GITHUB_TOKEN-created PRs do NOT trigger downstream CI, so the
        # lint.yml rot guard will NOT run on this PR. Set a DEMO_PAT secret (a
        # fine-scoped PAT or GitHub App token) to make CI run on the bot PR;
        # otherwise the human reviewer is the gate. TODO: pin action to a SHA.
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.DEMO_PAT || secrets.GITHUB_TOKEN }}
          branch: demo-refresh
          base: master
          add-paths: |
            .github/assets/lightener-curve-editor-demo.gif
            .github/assets/demo-meta.json
          commit-message: "chore(demo): refresh demo GIF"
          title: "chore(demo): refresh demo GIF"
          body: |
            Auto-generated by the **Demo refresh** workflow (`demo-refresh.yml`).

            Regenerates `.github/assets/lightener-curve-editor-demo.gif` from the
            current card via the Scenecast pipeline (`js/scripts/scenecast/`), plus
            the `demo-meta.json` source-SHA sidecar the release freshness gate checks.

            Review the GIF, then merge before cutting the release.
          delete-branch: false
