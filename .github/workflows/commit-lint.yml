# Per-repo includer for the engineering-standards reusable commit-lint workflow.
# Canonical workflow: https://github.com/florianhorner/engineering-standards/blob/main/.github/workflows/commit-lint-reusable.yml
# SHA-pinned. 502b48e includes the PR-title shell-injection fix (engineering-standards #4);
# do not roll back below it. Bump deliberately when the reusable workflow changes.
name: commit-lint

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]

permissions:
  contents: read
  pull-requests: write

jobs:
  commit-lint:
    uses: florianhorner/engineering-standards/.github/workflows/commit-lint-reusable.yml@502b48e0521350509f06cd3c6ad65a7c848f23af
