name: "Quality"

on:
  push:
    branches:
      - "master"
  pull_request:
    branches:
      - "master"

permissions:
  contents: read

jobs:
  ruff:
    name: "Ruff"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout the repository"
        uses: "actions/checkout@v4"

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "Install ruff"
        run: python3 -m pip install ruff>=0.4.0

      - name: "Ruff check"
        run: python3 -m ruff check .

      - name: "Ruff format check"
        run: python3 -m ruff format --check .

  mypy:
    name: "Mypy"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout the repository"
        uses: "actions/checkout@v4"

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "Install mypy"
        run: python3 -m pip install mypy

      - name: "Run mypy"
        run: python3 -m mypy custom_components/lightener/

  pytest:
    name: "Pytest"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout the repository"
        uses: "actions/checkout@v4"

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            requirements-ha-test.txt
            requirements.txt

      - name: "Install requirements"
        run: |
          # Order is load-bearing: requirements-ha-test.txt pulls in
          # pytest_homeassistant_custom_component, which pins pytest==9.0.0.
          # requirements.txt installs second to override pytest to its own pin.
          # A constraints file can't express this (the HA pin is exact), so the
          # ordering is the mechanism — the guard below fails loud if it breaks.
          python3 -m pip install -r requirements-ha-test.txt
          python3 -m pip install -r requirements.txt
          expected="$(grep -oE '^pytest==[0-9.]+' requirements.txt | cut -d= -f3 || true)"
          actual="$(python3 -c 'import pytest; print(pytest.__version__)')"
          if [ -z "$expected" ]; then
            echo "::error::no pinned 'pytest==' found in requirements.txt"; exit 1
          fi
          if [ "$expected" != "$actual" ]; then
            echo "::error::pytest version regression: requirements.txt pins $expected but $actual is installed (install order broke the override)"; exit 1
          fi

      - name: "Run tests with coverage"
        run: >-
          python3 -m pytest
          --cov=custom_components/lightener
          --cov-report=xml
          --cov-report=term
          --cov-fail-under=92

      - name: "Upload Python coverage"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: coverage.xml
          if-no-files-found: warn
          retention-days: 14

  version-sync:
    name: "Version sync"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout the repository"
        uses: "actions/checkout@v4"

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "Set up Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: js/package-lock.json

      - name: "Install frontend dependencies"
        run: npm ci
        working-directory: js

      - name: "Check CARD_VERSION matches manifest.json"
        run: |
          python3 scripts/sync-version
          cd js
          npm run build
          cd ..
          if ! git diff --quiet; then
            echo "::error::CARD_VERSION markers or generated frontend bundles are out of sync with manifest.json. Run scripts/sync-version, then rebuild the frontend bundle and commit the result."
            git diff
            exit 1
          fi

  frontend:
    name: "Frontend"
    runs-on: "ubuntu-latest"
    defaults:
      run:
        working-directory: js
    steps:
      - name: "Checkout the repository"
        uses: "actions/checkout@v4"

      - name: "Set up Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: js/package-lock.json

      - name: "Install dependencies"
        run: npm ci

      - name: "Install Playwright browser"
        run: npx playwright install --with-deps chromium

      - name: "ESLint"
        run: npx eslint src/

      - name: "Prettier check"
        run: npx prettier --check src/

      - name: "TypeScript check"
        run: npx tsc --noEmit

      - name: "Tests with coverage"
        run: npm run test:coverage

      - name: "Browser layout/overflow regression tests"
        run: npm run test:browser

      - name: "Demo capture rot guard"
        # Runs the demo choreography headless and asserts per-beat card state +
        # frame dims (no encoder needed — --check never encodes). Catches a
        # broken selector/choreography at PR time, not three releases later.
        # Explicit build: capture.html imports the built docs/ bundle; don't rely
        # on the test:browser step's side-effect build staying ordered above.
        run: |
          npm run build
          npm run demo:check

      - name: "Upload frontend coverage"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: js/coverage
          if-no-files-found: warn
          retention-days: 14

  ws-vs-http-guard:
    name: "WS-vs-HTTP guard"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout the repository"
        uses: "actions/checkout@v4"

      - name: "Reject callWS for HTTP-only HA config_entries endpoints"
        run: |
          if grep -rEn "callWS[^)]*type:[[:space:]]*['\"]config_entries/(flow|remove|disable|subentries)" \
              custom_components/lightener/frontend/ js/src/; then
            echo "::error::callWS used for HTTP-only HA config_entries endpoint. Use hass.callApi(method, 'config/config_entries/...', body) instead — those endpoints are NOT registered as WebSocket commands in HA core (only flow/progress, flow/subscribe, get_single, update, disable, ignore_flow, subentries/list|update|delete are WS). See PR #78 for the regression that motivated this guard."
            exit 1
          fi
          echo "OK: no callWS to HTTP-only config_entries endpoints"

  attribution-guard:
    name: "Attribution guard"
    runs-on: "ubuntu-latest"
    permissions:
      contents: read
    steps:
      - name: "Checkout the repository"
        uses: "actions/checkout@v4"

      - name: "Self-test the matcher"
        # Regression assertions baked into the script (broaden the patterns
        # without silently losing coverage or gaining false positives).
        run: scripts/lint-attribution --self-test

      - name: "Reject 'ships upstream unchanged' claims in tracked docs"
        # Lightener Studio is a heavily extended fork (light.py ~500 lines
        # diverged + fork-only websocket.py), not a thin skin. The false claim
        # that it ships the integration unchanged has reappeared across the
        # README, repo description, and release notes. This guard stops it
        # re-entering tracked .md/.html. Root CHANGELOG.md is excluded
        # (historical); deliberate examples carry an <!-- lint-attribution-ok -->
        # HTML-comment marker.
        run: scripts/lint-attribution

      - name: "Check the public repo description (metadata, not a file)"
        # The repo description was one of the recurrence vectors; guard it with
        # the same matcher via --stdin.
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh repo view --json description -q .description | scripts/lint-attribution --stdin

  vocabulary-guard:
    name: "Vocabulary guard"
    runs-on: "ubuntu-latest"
    permissions:
      contents: read
    steps:
      - name: "Checkout the repository"
        uses: "actions/checkout@v4"

      - name: "Self-test the matcher"
        # Regression assertions baked into the script, so the banned list can be
        # tuned without silently losing coverage or gaining false positives.
        run: scripts/lint-vocabulary --self-test

      - name: "Reject cold or generic wording in user-facing copy"
        # "Lead with the light": new card display strings live in
        # js/src/utils/strings.ts and name what happens in the room, not the
        # machinery. Full banned list is enforced on strings.ts; the
        # universal-filler subset ("click here"/"simply"/"obvious") is enforced
        # on component source and the demo HTML.
        run: scripts/lint-vocabulary
