name: "Quality"

on:
  push:
    branches:
      - "master"
  pull_request:
    branches:
      - "master"

jobs:
  ruff:
    name: "Ruff"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout the repository"
        uses: "actions/checkout@v4"

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "Install ruff"
        run: python3 -m pip install ruff>=0.4.0

      - name: "Ruff check"
        run: python3 -m ruff check .

      - name: "Ruff format check"
        run: python3 -m ruff format --check .

  mypy:
    name: "Mypy"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout the repository"
        uses: "actions/checkout@v4"

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "Install mypy"
        run: python3 -m pip install mypy

      - name: "Run mypy"
        run: python3 -m mypy custom_components/lightener/

  pytest:
    name: "Pytest"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout the repository"
        uses: "actions/checkout@v4"

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: "Install requirements"
        run: python3 -m pip install -r requirements.txt

      - name: "Run tests with coverage"
        run: >-
          python3 -m pytest
          --cov=custom_components/lightener
          --cov-report=xml
          --cov-report=term
          --cov-fail-under=92

      - name: "Upload Python coverage"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: coverage.xml
          if-no-files-found: warn
          retention-days: 14

  version-sync:
    name: "Version sync"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout the repository"
        uses: "actions/checkout@v4"

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "Set up Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: js/package-lock.json

      - name: "Install frontend dependencies"
        run: npm ci
        working-directory: js

      - name: "Check CARD_VERSION matches manifest.json"
        run: |
          python3 scripts/sync-version
          cd js
          npm run build
          cd ..
          if ! git diff --quiet; then
            echo "::error::CARD_VERSION markers or generated frontend bundles are out of sync with manifest.json. Run scripts/sync-version, then rebuild the frontend bundle and commit the result."
            git diff
            exit 1
          fi

  frontend:
    name: "Frontend"
    runs-on: "ubuntu-latest"
    defaults:
      run:
        working-directory: js
    steps:
      - name: "Checkout the repository"
        uses: "actions/checkout@v4"

      - name: "Set up Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: js/package-lock.json

      - name: "Install dependencies"
        run: npm ci

      - name: "ESLint"
        run: npx eslint src/

      - name: "Prettier check"
        run: npx prettier --check src/

      - name: "TypeScript check"
        run: npx tsc --noEmit

      - name: "Tests with coverage"
        run: npm run test:coverage

      - name: "Upload frontend coverage"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: js/coverage
          if-no-files-found: warn
          retention-days: 14
