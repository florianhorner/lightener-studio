<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Live editing session timeline</title>
  <desc id="desc">A timeline showing ceiling, desk, and corner light brightness during a preview editing session.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="1" stop-color="#0b1020"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1074" cy="122" r="340" fill="#38bdf8" opacity="0.10"/>
  <circle cx="214" cy="640" r="350" fill="#f59e0b" opacity="0.10"/>
  <text x="82" y="86" fill="#e5edf8" font-family="Inter, IBM Plex Sans, Segoe UI, sans-serif" font-size="50" font-weight="760">One preview session, many live edits</text>
  <text x="84" y="124" fill="#9aa8bd" font-family="Inter, IBM Plex Sans, Segoe UI, sans-serif" font-size="21">A good value holds long enough to compare it with the rest of the room.</text>

  <g transform="translate(84 178)" filter="url(#shadow)">
    <rect width="1112" height="442" rx="24" fill="#101826" stroke="#26364d"/>

    <g transform="translate(92 68)">
      <path d="M0 0 V290 H920" fill="none" stroke="#334155" stroke-width="2"/>
      <path d="M0 58 H920 M0 116 H920 M0 174 H920 M0 232 H920" stroke="#334155" stroke-opacity="0.55"/>
      <text x="-48" y="8" fill="#94a3b8" font-family="Inter, IBM Plex Sans, Segoe UI, sans-serif" font-size="15">100</text>
      <text x="-38" y="66" fill="#94a3b8" font-family="Inter, IBM Plex Sans, Segoe UI, sans-serif" font-size="15">80</text>
      <text x="-38" y="124" fill="#94a3b8" font-family="Inter, IBM Plex Sans, Segoe UI, sans-serif" font-size="15">60</text>
      <text x="-38" y="182" fill="#94a3b8" font-family="Inter, IBM Plex Sans, Segoe UI, sans-serif" font-size="15">40</text>
      <text x="-38" y="240" fill="#94a3b8" font-family="Inter, IBM Plex Sans, Segoe UI, sans-serif" font-size="15">20</text>

      <path d="M0 210 C62 210 72 206 116 206 C150 206 156 130 210 130 C254 130 288 130 330 130 C370 130 394 104 438 104 C506 104 526 104 578 104 C640 104 658 62 724 62 C780 62 824 62 920 62" fill="none" stroke="#f59e0b" stroke-width="6" stroke-linecap="round"/>
      <path d="M0 168 C76 168 100 168 160 168 C214 168 236 206 296 206 C356 206 404 206 460 206 C526 206 540 134 606 134 C678 134 700 134 742 134 C792 134 812 112 920 112" fill="none" stroke="#38bdf8" stroke-width="6" stroke-linecap="round"/>
      <path d="M0 238 C86 238 112 238 180 238 C238 238 252 232 308 232 C370 232 408 232 486 232 C540 232 556 196 624 196 C704 196 722 196 780 196 C836 196 852 176 920 176" fill="none" stroke="#22c55e" stroke-width="6" stroke-linecap="round"/>

      <g stroke="#64748b" stroke-dasharray="5 7">
        <path d="M120 0 V290"/>
        <path d="M330 0 V290"/>
        <path d="M580 0 V290"/>
        <path d="M742 0 V290"/>
      </g>

      <g font-family="Inter, IBM Plex Sans, Segoe UI, sans-serif" font-size="15" fill="#cbd5e1">
        <text x="80" y="-14">Preview on</text>
        <text x="278" y="-14">Drag ceiling</text>
        <text x="526" y="-14">Drag desk</text>
        <text x="696" y="-14">Scrubber</text>
      </g>
    </g>

    <g transform="translate(790 58)">
      <rect width="250" height="126" rx="16" fill="#0f172a" stroke="#334155"/>
      <circle cx="30" cy="36" r="7" fill="#f59e0b"/>
      <text x="48" y="42" fill="#f8fafc" font-family="Inter, IBM Plex Sans, Segoe UI, sans-serif" font-size="17">Ceiling</text>
      <circle cx="30" cy="68" r="7" fill="#38bdf8"/>
      <text x="48" y="74" fill="#f8fafc" font-family="Inter, IBM Plex Sans, Segoe UI, sans-serif" font-size="17">Desk</text>
      <circle cx="30" cy="100" r="7" fill="#22c55e"/>
      <text x="48" y="106" fill="#f8fafc" font-family="Inter, IBM Plex Sans, Segoe UI, sans-serif" font-size="17">Corner</text>
    </g>

    <g transform="translate(72 366)">
      <rect width="958" height="42" rx="21" fill="#082f49" stroke="#0ea5e9" stroke-opacity="0.55"/>
      <text x="24" y="27" fill="#bae6fd" font-family="Inter, IBM Plex Sans, Segoe UI, sans-serif" font-size="17">Dragging one curve changes one light. Scrubbing changes the whole group. Values hold until restore or save ends the session.</text>
    </g>
  </g>
</svg>
