<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Preview, restore, save state model</title>
  <desc id="desc">A state machine for bounded live preview editing in Lightener Studio.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="17" flood-color="#000000" flood-opacity="0.36"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#7dd3fc"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#34d399"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#fbbf24"/>
    </marker>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1050" cy="110" r="360" fill="#38bdf8" opacity="0.11"/>
  <circle cx="190" cy="610" r="320" fill="#22c55e" opacity="0.08"/>
  <text x="84" y="86" fill="#e5edf8" font-family="Inter, IBM Plex Sans, Segoe UI, sans-serif" font-size="50" font-weight="760">Preview, restore, save</text>
  <text x="86" y="124" fill="#9aa8bd" font-family="Inter, IBM Plex Sans, Segoe UI, sans-serif" font-size="21">Preview keeps live edits intentional, reversible, and bounded.</text>

  <g filter="url(#shadow)">
    <g transform="translate(82 260)">
      <rect width="214" height="126" rx="18" fill="#101826" stroke="#334155"/>
      <text x="28" y="45" fill="#e2e8f0" font-family="Inter, IBM Plex Sans, Segoe UI, sans-serif" font-size="22" font-weight="720">Automation</text>
      <text x="28" y="77" fill="#94a3b8" font-family="Inter, IBM Plex Sans, Segoe UI, sans-serif" font-size="17">Home Assistant drives</text>
      <text x="28" y="101" fill="#94a3b8" font-family="Inter, IBM Plex Sans, Segoe UI, sans-serif" font-size="17">the Lightener group</text>
    </g>

    <g transform="translate(382 230)">
      <rect width="244" height="186" rx="18" fill="#101826" stroke="#255a78"/>
      <text x="28" y="45" fill="#dbeafe" font-family="Inter, IBM Plex Sans, Segoe UI, sans-serif" font-size="22" font-weight="720">Preview starts</text>
      <rect x="28" y="72" width="188" height="78" rx="14" fill="#082f49" stroke="#0ea5e9" stroke-opacity="0.55"/>
      <text x="48" y="103" fill="#bae6fd" font-family="Inter, IBM Plex Sans, Segoe UI, sans-serif" font-size="17">Capture current</text>
      <text x="48" y="128" fill="#bae6fd" font-family="Inter, IBM Plex Sans, Segoe UI, sans-serif" font-size="17">light states</text>
    </g>

    <g transform="translate(712 230)">
      <rect width="244" height="186" rx="18" fill="#101826" stroke="#255a78"/>
      <text x="28" y="45" fill="#dbeafe" font-family="Inter, IBM Plex Sans, Segoe UI, sans-serif" font-size="22" font-weight="720">Shape live</text>
      <text x="28" y="79" fill="#94a3b8" font-family="Inter, IBM Plex Sans, Segoe UI, sans-serif" font-size="17">Curve points move</text>
      <text x="28" y="103" fill="#94a3b8" font-family="Inter, IBM Plex Sans, Segoe UI, sans-serif" font-size="17">matching lights.</text>
      <text x="28" y="139" fill="#fef3c7" font-family="Inter, IBM Plex Sans, Segoe UI, sans-serif" font-size="17">Good settings hold</text>
      <text x="28" y="163" fill="#fef3c7" font-family="Inter, IBM Plex Sans, Segoe UI, sans-serif" font-size="17">during the session.</text>
    </g>

    <g transform="translate(1040 184)">
      <rect width="180" height="104" rx="18" fill="#102216" stroke="#22c55e"/>
      <text x="30" y="45" fill="#dcfce7" font-family="Inter, IBM Plex Sans, Segoe UI, sans-serif" font-size="22" font-weight="720">Save</text>
      <text x="30" y="76" fill="#bbf7d0" font-family="Inter, IBM Plex Sans, Segoe UI, sans-serif" font-size="16">Persist curves</text>
    </g>

    <g transform="translate(1040 358)">
      <rect width="180" height="104" rx="18" fill="#21170b" stroke="#f59e0b"/>
      <text x="30" y="45" fill="#fef3c7" font-family="Inter, IBM Plex Sans, Segoe UI, sans-serif" font-size="22" font-weight="720">Restore</text>
      <text x="30" y="76" fill="#fde68a" font-family="Inter, IBM Plex Sans, Segoe UI, sans-serif" font-size="16">Return safely</text>
    </g>
  </g>

  <path d="M305 323 H368" fill="none" stroke="#7dd3fc" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M637 323 H698" fill="none" stroke="#7dd3fc" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M968 286 C1000 260 1010 238 1028 236" fill="none" stroke="#34d399" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowGreen)"/>
  <path d="M968 372 C1000 396 1014 408 1028 410" fill="none" stroke="#fbbf24" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowAmber)"/>
  <path d="M1130 175 C1064 88 238 94 188 248" fill="none" stroke="#34d399" stroke-width="4" stroke-opacity="0.72" stroke-linecap="round" marker-end="url(#arrowGreen)"/>
  <path d="M1130 470 C1018 592 280 584 194 397" fill="none" stroke="#fbbf24" stroke-width="4" stroke-opacity="0.72" stroke-linecap="round" marker-end="url(#arrowAmber)"/>

  <g transform="translate(396 520)">
    <rect width="486" height="58" rx="29" fill="#0f172a" stroke="#2a3b55"/>
    <text x="30" y="37" fill="#cbd5e1" font-family="Inter, IBM Plex Sans, Segoe UI, sans-serif" font-size="18">The live state belongs to the editing session.</text>
  </g>
</svg>
