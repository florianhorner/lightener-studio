<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">The room is the preview</title>
  <desc id="desc">A loop showing curve editing, live lights, room judgement, and saving back into Lightener Studio.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080b14"/>
      <stop offset="0.55" stop-color="#101826"/>
      <stop offset="1" stop-color="#07111c"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="72%" cy="30%" r="55%">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.24"/>
      <stop offset="0.55" stop-color="#38bdf8" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowAmber" cx="20%" cy="82%" r="55%">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.20"/>
      <stop offset="0.55" stop-color="#f59e0b" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7dd3fc"/>
    </marker>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#glowBlue)"/>
  <rect width="1280" height="720" fill="url(#glowAmber)"/>
  <g opacity="0.28">
    <path d="M0 120 H1280 M0 240 H1280 M0 360 H1280 M0 480 H1280 M0 600 H1280" stroke="#ffffff" stroke-opacity="0.05"/>
    <path d="M160 0 V720 M320 0 V720 M480 0 V720 M640 0 V720 M800 0 V720 M960 0 V720 M1120 0 V720" stroke="#ffffff" stroke-opacity="0.05"/>
  </g>

  <text x="92" y="94" fill="#e5edf8" font-family="Inter, IBM Plex Sans, Segoe UI, sans-serif" font-size="52" font-weight="760">The room is the preview</text>
  <text x="94" y="132" fill="#9aa8bd" font-family="Inter, IBM Plex Sans, Segoe UI, sans-serif" font-size="21">Lightener Studio turns curve editing into a bounded live rehearsal.</text>

  <g transform="translate(160 214)" filter="url(#shadow)">
    <rect width="238" height="172" rx="18" fill="#101826" stroke="#2a3b55"/>
    <text x="28" y="44" fill="#dbeafe" font-family="Inter, IBM Plex Sans, Segoe UI, sans-serif" font-size="22" font-weight="720">1. Drag the curve</text>
    <path d="M34 128 C72 112 88 68 130 84 C168 98 172 124 210 58" fill="none" stroke="#60a5fa" stroke-width="6" stroke-linecap="round"/>
    <circle cx="130" cy="84" r="10" fill="#f59e0b" stroke="#fff7ed" stroke-width="3"/>
    <path d="M114 104 l28 40 l10 -22 l24 10 l-10 -24 l22 -6 z" fill="#e5edf8" stroke="#1e293b" stroke-width="2"/>
  </g>

  <g transform="translate(521 178)" filter="url(#shadow)">
    <rect width="238" height="244" rx="18" fill="#101826" stroke="#2a3b55"/>
    <text x="28" y="44" fill="#dbeafe" font-family="Inter, IBM Plex Sans, Segoe UI, sans-serif" font-size="22" font-weight="720">2. Lights answer</text>
    <g transform="translate(42 82)">
      <path d="M46 0 V34" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
      <path d="M18 36 H74 L62 88 H30 Z" fill="#fbbf24" fill-opacity="0.35" stroke="#fcd34d" stroke-width="4"/>
      <path d="M10 96 C28 124 64 124 82 96" fill="none" stroke="#fbbf24" stroke-opacity="0.42" stroke-width="5" stroke-linecap="round"/>
    </g>
    <g transform="translate(136 104)">
      <path d="M42 0 V30" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
      <path d="M14 30 H70 L58 78 H26 Z" fill="#38bdf8" fill-opacity="0.32" stroke="#7dd3fc" stroke-width="4"/>
      <path d="M8 86 C24 110 60 110 76 86" fill="none" stroke="#38bdf8" stroke-opacity="0.40" stroke-width="5" stroke-linecap="round"/>
    </g>
    <text x="30" y="210" fill="#94a3b8" font-family="Inter, IBM Plex Sans, Segoe UI, sans-serif" font-size="17">The room answers.</text>
  </g>

  <g transform="translate(884 214)" filter="url(#shadow)">
    <rect width="238" height="172" rx="18" fill="#101826" stroke="#2a3b55"/>
    <text x="28" y="44" fill="#dbeafe" font-family="Inter, IBM Plex Sans, Segoe UI, sans-serif" font-size="22" font-weight="720">3. Judge the room</text>
    <path d="M36 108 C70 58 168 58 202 108 C168 158 70 158 36 108 Z" fill="#0f172a" stroke="#7dd3fc" stroke-width="4"/>
    <circle cx="119" cy="108" r="28" fill="#38bdf8" fill-opacity="0.22" stroke="#fbbf24" stroke-width="5"/>
    <circle cx="119" cy="108" r="9" fill="#e0f2fe"/>
  </g>

  <g transform="translate(522 496)" filter="url(#shadow)">
    <rect width="238" height="132" rx="18" fill="#101826" stroke="#2a3b55"/>
    <text x="28" y="44" fill="#dbeafe" font-family="Inter, IBM Plex Sans, Segoe UI, sans-serif" font-size="22" font-weight="720">4. Save when right</text>
    <rect x="62" y="74" width="114" height="34" rx="9" fill="#2563eb" stroke="#93c5fd"/>
    <text x="88" y="97" fill="#eff6ff" font-family="Inter, IBM Plex Sans, Segoe UI, sans-serif" font-size="17" font-weight="720">Save</text>
  </g>

  <path d="M407 300 C454 266 476 244 510 246" fill="none" stroke="#7dd3fc" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M771 246 C827 232 850 242 879 286" fill="none" stroke="#7dd3fc" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1003 394 C955 505 837 571 771 568" fill="none" stroke="#7dd3fc" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M516 568 C408 552 295 477 258 394" fill="none" stroke="#7dd3fc" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g transform="translate(95 612)">
    <rect width="342" height="46" rx="23" fill="#0f172a" stroke="#2a3b55"/>
    <circle cx="28" cy="23" r="7" fill="#22c55e"/>
    <text x="50" y="30" fill="#cbd5e1" font-family="Inter, IBM Plex Sans, Segoe UI, sans-serif" font-size="17">Preview live. Restore safely.</text>
  </g>
</svg>
