repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: js-lint-format
        name: JS lint & format
        entry: bash -c 'cd js && npx lint-staged'
        language: system
        pass_filenames: false
        files: '^js/src/.*\.ts$'
      - id: lint-vocabulary
        name: Vocabulary (Lead with the light)
        entry: scripts/lint-vocabulary
        language: system
        pass_filenames: false
        files: '^(js/src/.*\.ts|docs/.*\.html)$'
